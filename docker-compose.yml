version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mana
    ports:
      - '5432:5432'
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/mana
    depends_on:
      - db
    ports:
      - '8000:8000'
  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/mana
    depends_on:
      - backend
    ports:
      - '3000:3000'
  mailhog:
    image: mailhog/mailhog
    ports:
      - '8025:8025'
